<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=IBM+Plex+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #F6F2EA;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* Curtain / Launch screen */
    .curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F6F2EA;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: transform 1.6s cubic-bezier(0.76, 0, 0.24, 1);
      padding: 24px;
    }

    /* When active, slide curtain up */
    body.launched .curtain {
      transform: translateY(-100%);
    }

    /* Center Logo */
    .logo {
      width: 580px;
      max-width: 90vw;
      height: auto;
      margin-bottom: 64px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
    }

    /* Launch Button */
    .launch-btn {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      padding: 16px 40px;
      background-color: #7A3E2B;
      color: #F6F2EA;
      border: none;
      border-radius: 0;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.25s ease, transform 0.2s ease;
    }

    .launch-btn:hover {
      background-color: #5e2f20;
    }

    .launch-btn:active {
      transform: scale(0.98);
    }

    /* Preloaded Website Frame behind */
    #site-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
      transform: scale(0.97);
      transition: transform 1.6s cubic-bezier(0.76, 0, 0.24, 1);
    }

    /* When active, scale website to 1 */
    body.launched #site-frame {
      transform: scale(1);
    }
  </style>
</head>
<body>

  <!-- Curtain (Launch Screen) -->
  <div class="curtain">
    <img src="/logo.png" alt="Logo" class="logo">
    <button class="launch-btn" id="launchBtn">Launch Website</button>
  </div>

  <!-- Main Website Preloaded behind -->
  <iframe id="site-frame" src="/"></iframe>

  <!-- Canvas Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    document.getElementById('launchBtn').addEventListener('click', () => {
      // Trigger a beautiful, premium side-launcher confetti effect (like physical party poppers)
      const duration = 1200;
      const animationEnd = Date.now() + duration;

      (function frame() {
        const timeLeft = animationEnd - Date.now();

        // Left party popper
        confetti({
          particleCount: 4,
          angle: 60,
          spread: 55,
          origin: { x: 0, y: 0.85 },
          colors: ['#7A3E2B', '#E7DED0', '#F6F2EA', '#111111']
        });

        // Right party popper
        confetti({
          particleCount: 4,
          angle: 120,
          spread: 55,
          origin: { x: 1, y: 0.85 },
          colors: ['#7A3E2B', '#E7DED0', '#F6F2EA', '#111111']
        });

        if (timeLeft > 0) {
          requestAnimationFrame(frame);
        }
      }());

      document.body.classList.add('launched');
    });
  </script>
</body>
</html>
